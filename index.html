const SB_OK = !!(SUPABASE_URL && SUPABASE_ANON);

// ─── Supabase helpers ─────────────────────────────────────────────────────────
async function sbFetch(path, opts={}) {
  const token = opts.token || SUPABASE_ANON;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers:{ apikey:SUPABASE_ANON, Authorization:`Bearer ${token}`,
              "Content-Type":"application/json", Prefer:"return=representation",
              ...(opts.headers||{}) },
    ...opts,
  });
  if (!res.ok) throw new Error(`Supabase ${res.status}: ${await res.text()}`);
  return res.status===204 ? null : res.json();
}
async function sbLogin(email,password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method:"POST", headers:{apikey:SUPABASE_ANON,"Content-Type":"application/json"},
    body:JSON.stringify({email,password}),
  });
  if (!res.ok) throw new Error("Invalid email or password.");
  return res.json();
}
function rowToScheme(r) {
  const acts = r.scheme_activities || [];
  return {
    id:r.id, schemeNo:r.scheme_no, name:r.name, ministry:r.ministry,
    fundRecipient:r.fund_recipient,
    socioEconomicPreference:r.socio_economic_preference||"Open to All",
    stateCentral:r.state_central, status:r.status, submittedBy:r.submitted_by,
    createdAt:r.created_at,
    endRecipientTypes:   [...new Set(acts.map(a=>a.end_recipient_type).filter(Boolean))],
    valueChainActivities:[...new Set(acts.map(a=>a.value_chain_activity).filter(Boolean))],
    financingTypes:      [...new Set(acts.map(a=>a.financing_type).filter(Boolean))],
    activities:acts.map(a=>({endRecipientType:a.end_recipient_type,
      valueChainActivity:a.value_chain_activity,financingType:a.financing_type,
      financingNotes:a.financing_notes,link:a.link})),
    links:[...new Set(acts.map(a=>a.link).filter(Boolean))],
  };
}
async function loadActive() {
  if (!SB_OK) return OFFLINE_SCHEMES;
  const rows = await sbFetch("schemes?status=eq.active&select=*,scheme_activities(*)&order=scheme_no.asc");
  return rows.map(rowToScheme);
}
async function loadPending(token) {
  const rows = await sbFetch("schemes?status=eq.pending&select=*,scheme_activities(*)&order=created_at.desc",{token});
  return rows.map(rowToScheme);
}
async function approveScheme(id,token){return sbFetch(`schemes?id=eq.${id}`,{method:"PATCH",token,body:JSON.stringify({status:"active"})});}
async function rejectScheme(id,token){return sbFetch(`schemes?id=eq.${id}`,{method:"PATCH",token,body:JSON.stringify({status:"archived"})});}
async function submitContrib(data) {
  const rows = await sbFetch("schemes",{method:"POST",body:JSON.stringify({
    scheme_no:data.schemeNo,name:data.name,ministry:data.ministry,
    fund_recipient:data.fundRecipient,socio_economic_preference:data.socioEconomicPreference,
    state_central:"Central",status:"pending",submitted_by:data.submittedBy||null,
  })});
  const sid = rows[0].id;
  if (data.act.financingType) {
    await sbFetch("scheme_activities",{method:"POST",body:JSON.stringify({
      scheme_id:sid,end_recipient_type:data.act.endRecipientType,
      value_chain_activity:data.act.valueChainActivity,financing_type:data.act.financingType,
      financing_notes:data.act.financingNotes,link:data.act.link,
    })});
  }
}

function Tag({label,c}) {

  return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:12,fontSize:11,
    fontWeight:600,background:col.bg,color:col.text,border:`1px solid ${col.border}`,
    marginRight:4,marginBottom:4,lineHeight:1.6}}>{label}</span>;
}
function Btn({onClick,children,v="default",sm,disabled,type="button"}) {
  const M={default:{bg:"#f8fafc",fg:"#374151",bd:"#e2e8f0"},
           primary:{bg:"#2d6a4f",fg:"#fff",bd:"#2d6a4f"},
           danger: {bg:"#fee2e2",fg:"#9b1c1c",bd:"#fca5a5"},
           ghost:  {bg:"transparent",fg:"#6b7280",bd:"transparent"}};
  const s=M[v]||M.default;
  return <button type={type} onClick={onClick} disabled={disabled} style={{
    padding:sm?"3px 10px":"7px 14px",borderRadius:7,fontSize:sm?11:13,fontWeight:600,
    cursor:disabled?"not-allowed":"pointer",background:s.bg,color:s.fg,
    border:`1px solid ${s.bd}`,opacity:disabled?0.5:1}}>{children}</button>;
}
function Inp({label,value,onChange,type="text",placeholder,req}) {

    {label&&<label style={{display:"block",fontSize:11,fontWeight:700,color:"#6b7280",
      textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>
      {label}{req&&<span style={{color:"#dc2626"}}> *</span>}</label>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)}

      style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1px solid #d1d5db",fontSize:13,color:"#111",background:"#fff"}}/>

function Sel({label,value,onChange,options,placeholder,req}) {

function Txa({label,value,onChange,placeholder,req,rows=3}) {
  return <div style={{marginBottom:12}}>

      textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>

function CopyBlock({code}) {
  const [cp,setCp]=React.useState(false);
  const copy=()=>{navigator.clipboard.writeText(code).then(()=>{setCp(true);setTimeout(()=>setCp(false),2000);});};
  return <div style={{position:"relative",marginBottom:12}}>
    <pre><code>{code}</code></pre>
    <button onClick={copy} style={{position:"absolute",top:8,right:8,cursor:"pointer",
      padding:"3px 8px",borderRadius:4,border:"1px solid #475569",background:"#334155",fontSize:11,color:"#e2e8f0"}}>
      {cp?"Copied!":"Copy"}</button>
  </div>;
}

function BrowseTab({schemes,cmpList,setCmpList}) {

  const [cmpMode,setCmpMode]=React.useState(false);
  const uniq=arr=>[...new Set(arr)].sort();
  const tog=(k,v)=>setFil(f=>({...f,[k]:f[k].includes(v)?f[k].filter(x=>x!==v):[...f[k],v]}));
  const togCmp=s=>setCmpList(p=>{
    const has=p.find(x=>x.name===s.name);
    if(has)return p.filter(x=>x.name!==s.name);
    if(p.length>=4)return p;
    return [...p,s];
  });
  const filtered=React.useMemo(()=>schemes.filter(s=>{
    if(fil.search){const q=fil.search.toLowerCase();

         !s.activities.some(a=>(a.financingNotes||"").toLowerCase().includes(q)))return false;}

    if(fil.preference.length&&!fil.preference.includes(s.socioEconomicPreference))return false;

    if(fil.activity.length&&!fil.activity.some(a=>s.valueChainActivities.includes(a)))return false;
    return true;
  }),[schemes,fil]);
  const Sec=({title,field,opts})=><div style={{marginBottom:16}}>
    <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>{title}</div>

      <span style={{fontSize:12,color:fil[field].includes(opt)?"#111":"#4b5563",fontWeight:fil[field].includes(opt)?600:400}}>{opt}</span>
    </label>)}
  </div>;
  return <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:16}}>
    <div style={{background:"#fff",borderRadius:10,padding:16,border:"1px solid #e2e8f0",position:"sticky",top:16,alignSelf:"start"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontWeight:700,color:"#111",fontSize:13}}>Filters</div>
        <button onClick={()=>setFil({ministry:[],activity:[],financing:[],preference:[],recipient:[],search:""})}

      </div>
      <div style={{marginBottom:14}}>
        <input value={fil.search} onChange={e=>setFil(f=>({...f,search:e.target.value}))}
          placeholder="Search schemes…"
          style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #d1d5db",fontSize:12}}/>
      </div>
      <Sec title="Ministry/Dept"            field="ministry"   opts={uniq(schemes.map(s=>s.ministry))}/>
      <Sec title="Socio-Economic Preference" field="preference" opts={["ST","SC&ST","Open to All"]}/>
      <Sec title="Financing Type"           field="financing"  opts={uniq(schemes.flatMap(s=>s.financingTypes))}/>
      <Sec title="End Recipient"            field="recipient"  opts={uniq(schemes.flatMap(s=>s.endRecipientTypes))}/>
      <Sec title="Value Chain Activity"     field="activity"   opts={uniq(schemes.flatMap(s=>s.valueChainActivities))}/>
    </div>
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:13,color:"#6b7280"}}><strong style={{color:"#111"}}>{filtered.length}</strong> of {schemes.length} schemes</div>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,cursor:"pointer",color:cmpMode?"#166534":"#6b7280",fontWeight:cmpMode?700:400}}>
          <input type="checkbox" checked={cmpMode} onChange={e=>setCmpMode(e.target.checked)} style={{accentColor:"#2d6a4f"}}/>
          Compare mode
          {cmpMode&&cmpList.length>0&&<span style={{marginLeft:4,padding:"2px 8px",borderRadius:5,background:"#2d6a4f",color:"#fff",fontSize:11,fontWeight:700}}>{cmpList.length} selected</span>}
        </label>
      </div>
      {filtered.map(s=><SchemeCard key={s.name} s={s} onSel={togCmp} sel={!!cmpList.find(c=>c.name===s.name)} cmpMode={cmpMode}/>)}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#9ca3af"}}>No schemes match the current filters.</div>}
    </div>
  </div>;
}

// ─── Eligibility Tab ──────────────────────────────────────────────────────────
function EligTab({schemes}) {
  const [form,setForm]=React.useState({cat:"",ent:"",act:""});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const acts=[...new Set(schemes.flatMap(s=>s.valueChainActivities))].sort();
  const ents=["Gram Panchayat","Primary Group (SHG/Producer group)","Individual Entrepreneur/MSME","Farmer","Business Incubator","District Authority"];
  const matches=React.useMemo(()=>{
    if(!form.cat&&!form.ent&&!form.act)return[];
    return schemes.filter(s=>{
      const cm=!form.cat||(s.socioEconomicPreference==="Open to All"||(s.socioEconomicPreference==="ST"&&form.cat.startsWith("ST"))||(s.socioEconomicPreference==="SC&ST"&&(form.cat.startsWith("SC")||form.cat.startsWith("ST"))));
      const em=!form.ent||s.endRecipientTypes.some(e=>e.includes(form.ent.split(" ")[0]));
      const am=!form.act||s.valueChainActivities.includes(form.act);
      return cm&&em&&am;
    });
  },[form,schemes]);
  const filled=form.cat||form.ent||form.act;
  return <div>
    <div style={{background:"#fff",borderRadius:10,padding:20,border:"1px solid #e2e8f0",marginBottom:20}}>
      <h3 style={{fontWeight:700,fontSize:15,marginBottom:4}}>Tell us about yourself</h3>
      <p style={{fontSize:12,color:"#6b7280",marginBottom:16}}>Select your profile to find relevant schemes.</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12}}>
        <Sel label="Social Category" value={form.cat} onChange={v=>set("cat",v)} options={["ST (Scheduled Tribe)","SC (Scheduled Caste)","SC/ST","OBC","General / Open"]}/>
        <Sel label="Entity Type" value={form.ent} onChange={v=>set("ent",v)} options={ents} placeholder="Any entity"/>
        <Sel label="Activity / Need" value={form.act} onChange={v=>set("act",v)} options={acts} placeholder="Any activity"/>
      </div>
    </div>
    {filled?<div>
      <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:"#374151"}}>
        {matches.length===0?"No schemes matched — try relaxing your filters.":`${matches.length} scheme${matches.length>1?"s":""} match your profile`}
      </div>
      {matches.map(s=><SchemeCard key={s.name} s={s}/>)}
    </div>:<div style={{textAlign:"center",padding:"40px 20px",color:"#9ca3af",fontSize:13}}>Select at least one option above to see matching schemes.</div>}
  </div>;
}

// ─── Compare Tab ─────────────────────────────────────────────────────────────

    {l:"Ministry",fn:s=>s.ministry},

    {l:"Eligibility",fn:s=><Tag label={s.socioEconomicPreference} c={PC[s.socioEconomicPreference]||PC["Open to All"]}/>},

    {l:"Value Chain Activities",fn:s=>s.valueChainActivities.map(v=><div key={v}>⛓ {v}</div>)},

        {sel.map(s=><th key={s.name} style={{background:"#f0fdf4",padding:"10px 12px",fontSize:13,fontWeight:700,color:"#166534",textAlign:"left",borderBottom:"2px solid #86efac",position:"relative"}}>
          <div style={{paddingRight:20}}>
            <div style={{fontSize:10,color:"#6b7280",marginBottom:2}}>#{s.schemeNo}</div>
            {s.name}
          </div>
          <button onClick={()=>onRem(s)} style={{position:"absolute",top:8,right:8,background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#9ca3af"}}>✕</button>

        <td style={{padding:"10px 12px",fontSize:11,fontWeight:700,color:"#6b7280",verticalAlign:"top",borderBottom:"1px solid #f1f5f9"}}>{f.l}</td>
        {sel.map(s=><td key={s.name} style={{padding:"10px 12px",fontSize:12,color:"#374151",verticalAlign:"top",borderBottom:"1px solid #f1f5f9",lineHeight:1.5}}>{f.fn(s)}</td>)}

}

// ─── Contribute Tab ───────────────────────────────────────────────────────────
const EMPTY_FORM={mode:"add",targetScheme:"",schemeNo:"",name:"",ministry:"",otherMinistry:"",
  fundRecipient:"",socioEconomicPreference:"Open to All",submittedBy:"",
  act:{endRecipientType:"",valueChainActivity:"",financingType:"",financingNotes:"",link:""}};

function ContribTab({schemes}) {
  const [form,setForm]=React.useState(EMPTY_FORM);
  const [st,setSt]=React.useState(null);
  const [err,setErr]=React.useState("");
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setAct=(k,v)=>setForm(f=>({...f,act:{...f.act,[k]:v}}));
  const allActs=[...new Set(schemes.flatMap(s=>s.valueChainActivities))].sort();
  const allMins=[...new Set(schemes.map(s=>s.ministry))].sort();
  const finTypes=Object.keys(FC);
  const recTypes=["Gram Panchayat","Primary Group (SHG/Producer group)","Individual Entrepreneur/MSME","Farmer","Business Incubator","District Authority"];
  const handleSubmit=async(e)=>{
    e.preventDefault();
    if(!SB_OK){setErr("Supabase not configured. Add SUPABASE_URL and SUPABASE_ANON to the top of index.html.");return;}
    setSt("submitting");
    try{
      const ministry=form.ministry==="__other__"?form.otherMinistry:form.ministry;
      let name=form.name;
      if(form.mode==="update"&&form.targetScheme){
        name=`[UPDATE REQUEST] ${form.targetScheme}${form.name?` — ${form.name}`:""}`;
      }
      await submitContrib({...form,name,ministry});
      setSt("success");setForm(EMPTY_FORM);
    }catch(e){setSt(null);setErr(e.message);}
  };
  if(st==="success")return <div style={{background:"#f0fdf4",borderRadius:10,padding:32,textAlign:"center",border:"1px solid #86efac"}}>
    <div style={{fontSize:36,marginBottom:12}}>✓</div>
    <h3 style={{fontSize:16,fontWeight:700,color:"#166534",marginBottom:8}}>Submission received!</h3>
    <p style={{fontSize:13,color:"#4b5563",marginBottom:20}}>Your contribution has been saved and will be reviewed before going live.</p>
    <Btn v="primary" onClick={()=>setSt(null)}>Submit another</Btn>
  </div>;
  return <div style={{maxWidth:680}}>
    <div style={{background:"#fff",borderRadius:10,padding:20,border:"1px solid #e2e8f0",marginBottom:20}}>
      <h3 style={{fontWeight:700,fontSize:15,marginBottom:4}}>Contribute a scheme</h3>
      <p style={{fontSize:12,color:"#6b7280",lineHeight:1.6}}>Know of a relevant financing scheme not listed here, or spotted outdated information? Submit it below — all contributions are reviewed before going live.</p>
    </div>
    <form onSubmit={handleSubmit} style={{background:"#fff",borderRadius:10,padding:20,border:"1px solid #e2e8f0"}}>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[["add","Add a new scheme"],["update","Suggest an update to existing scheme"]].map(([m,lbl])=>
          <button key={m} type="button" onClick={()=>set("mode",m)} style={{flex:1,padding:"9px 0",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",
            background:form.mode===m?"#2d6a4f":"#f8fafc",color:form.mode===m?"#fff":"#374151",
            border:form.mode===m?"1px solid #2d6a4f":"1px solid #e2e8f0"}}>{lbl}</button>
        )}
      </div>
      {form.mode==="update"&&<Sel label="Which scheme are you updating?" value={form.targetScheme} onChange={v=>set("targetScheme",v)} req options={schemes.map(s=>s.name)} placeholder="Select a scheme…"/>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Inp label={form.mode==="update"?"Notes / what needs updating":"Scheme Name"} value={form.name} onChange={v=>set("name",v)} req={form.mode==="add"} placeholder={form.mode==="update"?"Describe what changed…":"Full official scheme name"}/>
        <Inp label="Scheme Number (if known)" value={form.schemeNo} onChange={v=>set("schemeNo",v)} placeholder="e.g. 27.0"/>
      </div>
      <Sel label="Ministry / Department" value={form.ministry} onChange={v=>set("ministry",v)} options={[...allMins,"Other (type below)"]} placeholder="Select…"/>
      {(form.ministry==="Other (type below)"||(!allMins.includes(form.ministry)&&form.ministry))&&
        <Inp label="Ministry name" value={form.otherMinistry} onChange={v=>set("otherMinistry",v)} placeholder="Type ministry/department name" req/>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Inp label="Fund Recipient (from GoI)" value={form.fundRecipient} onChange={v=>set("fundRecipient",v)} placeholder="e.g. Lending Institutions"/>
        <Sel label="Socio-Economic Preference" value={form.socioEconomicPreference} onChange={v=>set("socioEconomicPreference",v)} options={["Open to All","ST","SC&ST"]}/>
      </div>
      <div style={{borderTop:"1px solid #f1f5f9",paddingTop:16,marginTop:4,marginBottom:4}}>
        <div style={{fontWeight:700,fontSize:12,color:"#374151",marginBottom:12}}>Financing activity details</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Sel label="Financing Type" value={form.act.financingType} onChange={v=>setAct("financingType",v)} options={finTypes}/>
          <Sel label="End Recipient Type" value={form.act.endRecipientType} onChange={v=>setAct("endRecipientType",v)} options={recTypes}/>
        </div>
        <Sel label="Value Chain Activity" value={form.act.valueChainActivity} onChange={v=>setAct("valueChainActivity",v)} options={allActs} placeholder="Select activity…"/>
        <Txa label="Financing Notes / Details" value={form.act.financingNotes} onChange={v=>setAct("financingNotes",v)} placeholder="Key amounts, conditions, eligibility specifics…" rows={3}/>
        <Inp label="Link to Official Guidelines" value={form.act.link} onChange={v=>setAct("link",v)} placeholder="https://…" type="url"/>
      </div>
      <Inp label="Your Name / Organisation (optional)" value={form.submittedBy} onChange={v=>set("submittedBy",v)} placeholder="e.g. Living Landscapes"/>
      {err&&<div style={{background:"#fee2e2",borderRadius:8,padding:12,marginBottom:12,fontSize:12,color:"#9b1c1c"}}>{err}</div>}
      <Btn v="primary" type="submit" disabled={st==="submitting"}>{st==="submitting"?"Submitting…":"Submit contribution"}</Btn>
    </form>
  </div>;
}

// ─── Admin Tab ────────────────────────────────────────────────────────────────
function AdminTab() {
  const [sess,setSess]=React.useState(null);
  const [lf,setLf]=React.useState({email:"",password:""});
  const [le,setLe]=React.useState("");
  const [pending,setPending]=React.useState([]);
  const [loading,setLoading]=React.useState(false);
  const [editId,setEditId]=React.useState(null);
  const [ef,setEf]=React.useState({});
  const [msg,setMsg]=React.useState("");
  const flash=m=>{setMsg(m);setTimeout(()=>setMsg(""),3500);};
  const login=async(e)=>{e.preventDefault();setLe("");
    try{const s=await sbLogin(lf.email,lf.password);setSess(s);doLoad(s.access_token);}
    catch(err){setLe(err.message);}};
  const doLoad=async(token)=>{setLoading(true);
    try{setPending(await loadPending(token));}catch(e){flash("Error: "+e.message);}
    setLoading(false);};
  const approve=async(id)=>{await approveScheme(id,sess.access_token);
    setPending(p=>p.filter(s=>s.id!==id));flash("✓ Scheme approved and now live.");};
  const reject=async(id)=>{await rejectScheme(id,sess.access_token);
    setPending(p=>p.filter(s=>s.id!==id));flash("Scheme archived.");};
  const startEdit=s=>{setEditId(s.id);setEf({name:s.name,schemeNo:s.schemeNo,ministry:s.ministry,fundRecipient:s.fundRecipient,socioEconomicPreference:s.socioEconomicPreference});};
  const saveEdit=async(id)=>{
    await sbFetch(`schemes?id=eq.${id}`,{method:"PATCH",token:sess.access_token,
      body:JSON.stringify({name:ef.name,scheme_no:ef.schemeNo,ministry:ef.ministry,
        fund_recipient:ef.fundRecipient,socio_economic_preference:ef.socioEconomicPreference,status:"active"})});
    setPending(p=>p.filter(s=>s.id!==id));setEditId(null);flash("✓ Edited and approved.");};
  if(!SB_OK)return <div style={{background:"#fef3c7",borderRadius:10,padding:20,border:"1px solid #fcd34d",maxWidth:500}}>
    <h3 style={{fontWeight:700,color:"#92400e",marginBottom:8}}>Supabase not configured</h3>
    <p style={{fontSize:13,color:"#78350f",lineHeight:1.6}}>Add SUPABASE_URL and SUPABASE_ANON at the top of index.html, then run supabase_schema.sql and seed_supabase.py. See README.md for full instructions.</p>
  </div>;
  if(!sess)return <div style={{maxWidth:360}}>
    <div style={{background:"#fff",borderRadius:10,padding:24,border:"1px solid #e2e8f0"}}>
      <h3 style={{fontWeight:700,fontSize:15,marginBottom:16}}>Admin login</h3>
      <form onSubmit={login}>
        <Inp label="Email" value={lf.email} onChange={v=>setLf(f=>({...f,email:v}))} type="email" req/>
        <Inp label="Password" value={lf.password} onChange={v=>setLf(f=>({...f,password:v}))} type="password" req/>
        {le&&<div style={{color:"#9b1c1c",fontSize:12,marginBottom:12}}>{le}</div>}
        <Btn v="primary" type="submit">Log in</Btn>
      </form>
      <p style={{fontSize:11,color:"#9ca3af",marginTop:12,lineHeight:1.5}}>Use the email + password created in Supabase → Authentication → Users.</p>
    </div>
  </div>;
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h3 style={{fontWeight:700,fontSize:15}}>Pending submissions ({pending.length})</h3>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {msg&&<span style={{fontSize:12,color:"#166534",fontWeight:600}}>{msg}</span>}
        <Btn sm onClick={()=>doLoad(sess.access_token)}>Refresh</Btn>
        <Btn sm v="ghost" onClick={()=>setSess(null)}>Log out</Btn>
      </div>
    </div>
    {loading&&<div style={{color:"#6b7280",fontSize:13,padding:20}}>Loading…</div>}
    {!loading&&pending.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#9ca3af",fontSize:13}}>No pending submissions. All caught up!</div>}
    {pending.map(s=><div key={s.id} style={{background:"#fff",borderRadius:10,padding:16,marginBottom:12,border:"1px solid #e2e8f0"}}>
      {editId===s.id?<div>
        <div style={{fontWeight:700,marginBottom:12,fontSize:13}}>Edit before approving</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Name" value={ef.name} onChange={v=>setEf(f=>({...f,name:v}))}/>
          <Inp label="Scheme No" value={ef.schemeNo} onChange={v=>setEf(f=>({...f,schemeNo:v}))}/>
          <Inp label="Ministry" value={ef.ministry} onChange={v=>setEf(f=>({...f,ministry:v}))}/>
          <Inp label="Fund Recipient" value={ef.fundRecipient} onChange={v=>setEf(f=>({...f,fundRecipient:v}))}/>
        </div>
        <Sel label="Preference" value={ef.socioEconomicPreference} onChange={v=>setEf(f=>({...f,socioEconomicPreference:v}))} options={["Open to All","ST","SC&ST"]}/>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <Btn v="primary" sm onClick={()=>saveEdit(s.id)}>Approve with edits</Btn>
          <Btn sm onClick={()=>setEditId(null)}>Cancel</Btn>
        </div>
      </div>:<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{s.name}</div>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>{s.ministry}</div>
            <Tag label={s.socioEconomicPreference} c={PC[s.socioEconomicPreference]||PC["Open to All"]}/>
            {s.activities.map((a,i)=><Tag key={i} label={a.financingType} c={FC[a.financingType]}/>)}
            {s.activities[0]?.financingNotes&&<p style={{fontSize:12,color:"#374151",marginTop:8,lineHeight:1.5}}>{s.activities[0].financingNotes}</p>}
            {s.submittedBy&&<div style={{fontSize:11,color:"#9ca3af",marginTop:6}}>Submitted by: {s.submittedBy}</div>}
            <div style={{fontSize:11,color:"#9ca3af"}}>{new Date(s.createdAt).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}</div>
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0,marginLeft:16}}>
            <Btn sm v="primary" onClick={()=>approve(s.id)}>Approve</Btn>
            <Btn sm onClick={()=>startEdit(s)}>Edit & Approve</Btn>
            <Btn sm v="danger" onClick={()=>reject(s.id)}>Reject</Btn>
          </div>
        </div>
      </div>}
    </div>)}
  </div>;
}

// ─── For Developers Tab ───────────────────────────────────────────────────────
function DevTab() {
  const BASE=SUPABASE_URL||"https://YOUR-PROJECT.supabase.co";
  const KEY=SUPABASE_ANON||"YOUR_ANON_KEY";
  const GH=`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/data/schemes.json`;
  const SITE=`https://${GITHUB_USER}.github.io/${GITHUB_REPO}/`;
  const GHREPO=`https://github.com/${GITHUB_USER}/${GITHUB_REPO}`;
  const Sec=({title,children})=><section style={{background:"#fff",borderRadius:10,padding:20,border:"1px solid #e2e8f0",marginBottom:16}}>
    <h4 style={{fontWeight:700,marginBottom:12,fontSize:14}}>{title}</h4>{children}</section>;
  return <div style={{maxWidth:720}}>
    <div style={{background:"#fff",borderRadius:10,padding:20,border:"1px solid #e2e8f0",marginBottom:20}}>
      <h3 style={{fontWeight:700,fontSize:15,marginBottom:4}}>For Developers</h3>
      <p style={{fontSize:13,color:"#6b7280",lineHeight:1.6}}>All scheme data is freely accessible. No sign-up required for read access.</p>
    </div>
    <Sec title="1. Static JSON API (no auth needed)">
      <p style={{fontSize:12,color:"#6b7280",marginBottom:12,lineHeight:1.6}}>Full dump of all active schemes, auto-updated when the Excel file changes.</p>
      <CopyBlock code={GH}/>
      <CopyBlock code={`// JavaScript\nconst schemes = await fetch("${GH}").then(r => r.json());\n\n// Python\nimport requests\nschemes = requests.get("${GH}").json()`}/>
    </Sec>
    <Sec title="2. Live REST API — Supabase (filterable)">
      <p style={{fontSize:12,color:"#6b7280",marginBottom:4,lineHeight:1.6}}>Real-time filterable API. Include the <code style={{background:"#f1f5f9",padding:"1px 4px",borderRadius:3}}>apikey</code> header with every request. This key is public and safe to share.</p>
      <div style={{fontSize:12,color:"#374151",background:"#f8fafc",borderRadius:6,padding:10,marginBottom:12}}>
        <div><strong>Base:</strong> <code>{BASE}/rest/v1/</code></div>
        <div style={{marginTop:4}}><strong>API Key:</strong> <code>{KEY.length>40?KEY.slice(0,40)+"…":KEY}</code></div>
      </div>
      <CopyBlock code={`# All active schemes\ncurl "${BASE}/rest/v1/schemes?status=eq.active" -H "apikey: ${KEY}"\n\n# ST-only schemes\ncurl "${BASE}/rest/v1/schemes?status=eq.active&socio_economic_preference=eq.ST" \\\n  -H "apikey: ${KEY}"\n\n# Schemes with activities joined\ncurl "${BASE}/rest/v1/schemes?status=eq.active&select=*,scheme_activities(*)" \\\n  -H "apikey: ${KEY}"\n\n# Filter by financing type\ncurl "${BASE}/rest/v1/scheme_activities?financing_type=eq.Grant+Assistance" \\\n  -H "apikey: ${KEY}"`}/>
      <CopyBlock code={`// JavaScript\nconst res = await fetch(\n  "${BASE}/rest/v1/schemes?status=eq.active&select=*,scheme_activities(*)",\n  { headers: { apikey: "${KEY}" } }\n);\nconst schemes = await res.json();\n\n// Python\nimport requests\nschemes = requests.get(\n    "${BASE}/rest/v1/schemes",\n    headers={"apikey": "${KEY}"},\n    params={"status": "eq.active", "select": "*,scheme_activities(*)"}\n).json()`}/>
    </Sec>
    <Sec title="3. Embed on any website">
      <p style={{fontSize:12,color:"#6b7280",marginBottom:12,lineHeight:1.6}}>Paste this into any webpage to embed the full interactive app.</p>
      <CopyBlock code={`<iframe src="${SITE}" width="100%" height="700" frameborder="0"\n  style="border-radius:10px;border:1px solid #e2e8f0"></iframe>`}/>
    </Sec>
    <Sec title="4. Open Source on GitHub">
      <p style={{fontSize:12,color:"#6b7280",lineHeight:1.6}}>All code and data is open source. Fork it, adapt it for your region, or contribute back.</p>
      <a href={GHREPO} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",marginTop:8,fontSize:13,color:"#2d6a4f",fontWeight:600}}>{GHREPO} →</a>
    </Sec>
  </div>;
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=React.useState("browse");
  const [schemes,setSchemes]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [error,setError]=React.useState(null);
  const [cmpList,setCmpList]=React.useState([]);
  React.useEffect(()=>{
    loadActive().then(s=>{setSchemes(s);setLoading(false);})
      .catch(e=>{setError(e.message);setLoading(false);});
  },[]);
  const TABS=[
    {id:"browse",label:"Browse & Filter"},
    {id:"eligibility",label:"Eligibility Matcher"},
    {id:"compare",label:"Compare",badge:cmpList.length||null},
    {id:"contribute",label:"Contribute"},
  ];
  const UTIL_TABS=[
    {id:"admin",label:"Admin"},
    {id:"dev",label:"For Developers"},
  ];
  return <div style={{maxWidth:1200,margin:"0 auto",padding:16}}>
    <div style={{background:"linear-gradient(135deg,#1a3c2b 0%,#2d6a4f 100%)",borderRadius:12,padding:"20px 24px",marginBottom:20,color:"#fff"}}>
      <h1 style={{fontSize:20,fontWeight:800,marginBottom:4,lineHeight:1.3}}>NTFP Public Financing — Ready Reckoner</h1>
      <p style={{fontSize:13,opacity:0.85,lineHeight:1.6,maxWidth:700}}>Government of India financing schemes for NTFP value chains and ecological commons. Browse, filter, compare, contribute, and access the open API.</p>
      {!SB_OK&&<div style={{marginTop:10,padding:"5px 10px",background:"rgba(255,255,255,0.15)",borderRadius:6,fontSize:11,display:"inline-block"}}>Offline mode — configure Supabase to enable live data &amp; contributions</div>}
      <div style={{marginTop:12,display:"flex",gap:16,flexWrap:"wrap"}}>
        {[[schemes.length||30,"Schemes"],["10","Ministries/Depts"],["6","Financing types"],["13","Value chain activities"]].map(([n,l])=>
          <div key={l} style={{textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:800,lineHeight:1}}>{n}</div>
            <div style={{fontSize:11,opacity:0.75,marginTop:2}}>{l}</div>
          </div>)}
      </div>
    </div>
    <div style={{borderBottom:"1px solid #e2e8f0",display:"flex",gap:2,flexWrap:"wrap"}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{
        padding:"8px 16px",borderRadius:"8px 8px 0 0",fontSize:13,fontWeight:600,cursor:"pointer",
        background:tab===t.id?"#fff":"transparent",color:tab===t.id?"#166534":"#6b7280",
        border:tab===t.id?"1px solid #e2e8f0":"1px solid transparent",
        borderBottom:tab===t.id?"1px solid #fff":"none",position:"relative",bottom:"-1px"}}>
        {t.label}
        {t.badge?<span style={{marginLeft:6,background:"#2d6a4f",color:"#fff",borderRadius:10,fontSize:10,padding:"1px 6px"}}>{t.badge}</span>:null}
      </button>)}
    </div>
    <div style={{background:"#fff",borderRadius:"0 8px 8px 8px",border:"1px solid #e2e8f0",padding:16,marginBottom:20}}>
      {loading&&<div style={{textAlign:"center",padding:"60px 20px",color:"#6b7280",fontSize:13}}>Loading schemes…</div>}
      {error&&<div style={{background:"#fee2e2",borderRadius:8,padding:16,color:"#9b1c1c",fontSize:13}}>Error: {error}</div>}
      {!loading&&!error&&<>
        {tab==="browse"      &&<BrowseTab schemes={schemes} cmpList={cmpList} setCmpList={setCmpList}/>}
        {tab==="eligibility" &&<EligTab schemes={schemes}/>}
        {tab==="compare"     &&<CmpTab sel={cmpList} onRem={s=>setCmpList(p=>p.filter(c=>c.name!==s.name))}/>}
        {tab==="contribute"  &&<ContribTab schemes={schemes}/>}
      </>}
    </div>
    {(tab==="admin"||tab==="dev")&&
      <div style={{background:"#fff",borderRadius:8,border:"1px solid #e2e8f0",padding:16,marginBottom:20}}>
        <div style={{display:"flex",gap:8,marginBottom:16,borderBottom:"1px solid #f1f5f9",paddingBottom:10}}>
          {UTIL_TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:"6px 14px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",
            background:tab===t.id?"#166534":"#f8fafc",color:tab===t.id?"#fff":"#6b7280",
            border:"1px solid "+(tab===t.id?"#166534":"#e2e8f0")}}>
            {t.label}
          </button>)}
          <button onClick={()=>setTab("browse")} style={{marginLeft:"auto",padding:"6px 12px",borderRadius:6,fontSize:11,cursor:"pointer",background:"transparent",color:"#9ca3af",border:"1px solid #e2e8f0"}}>← Back to app</button>
        </div>
        {tab==="admin"&&<AdminTab/>}
        {tab==="dev"&&<DevTab/>}
      </div>}
    <div style={{textAlign:"center",fontSize:11,color:"#9ca3af",paddingBottom:16}}>
      Data sourced from Government of India scheme guidelines. Always verify at official portals. ·{" "}                                                                                              
        <a href={`https://github.com/${GITHUB_USER}/${GITHUB_REPO}`} target="_blank" rel="noopener noreferrer" style={{color:"#6b7280"}}>Open source on GitHub</a>
        {" · "}<button onClick={()=>setTab("dev")} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#9ca3af"}}>For Developers</button>                                       
        {" · "}<button onClick={()=>setTab("admin")} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#9ca3af"}}>Admin</button>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
